<div class="screen">
    <form class="mainBox" action="get" [formGroup]="loginForm" (ngSubmit)="login()">
            <p class="title">Log in to paint</p>
            <input class="inputs" type="text" placeholder="Username" formControlName="username">
            <input class="inputs" type="text" placeholder="Password" formControlName="password">
            <button class="buttons" type="submit" routerLink="">Login</button>
            <button class="buttons">Don't have an account? Create one!</button>
    </form>
</div>
