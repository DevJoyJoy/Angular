<div class="screen">
    <form class="mainBox" action="get" [formGroup]="subscribeForm" (ngSubmit)="subscribe()">
        <p class="title">Create an account</p>
        <input class="inputs" type="text" placeholder="Username" formControlName="username">
        <input class="inputs" type="text" placeholder="Password" formControlName="password">
        <button class="buttons" type="submit">Create</button>
        <button class="buttons">Already have an account? Sign in!</button>
    </form>
</div>
