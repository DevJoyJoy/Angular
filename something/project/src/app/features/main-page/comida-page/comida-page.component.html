<div class="listItem">
    <app-comida-card
        *ngFor="let food of foods; track: $index"
        [infofood]="food"
        (click)="onCardClick(food)">
    </app-comida-card>
</div>

<app-modal
    *ngIf="focusedFood"
    (onClose)="focusedFood = undefined"
    [Confirmation]="true"
    [Title]="'Pedido'"
    SaveLabel="Finalizar"
    (onSave)="save()">
    <h2>{{focusedFood.name}}</h2>
</app-modal>
